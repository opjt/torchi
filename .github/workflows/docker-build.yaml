name: Docker Build and Push

on:
  push:
    branches: [ "main" ] # л©”мқём—җ н‘ёмӢңлҗ  л•Ңл§Ң мһ‘лҸҷ
    paths-ignore:
      - '**.md'          # лӘЁл“  кІҪлЎңмқҳ .md нҢҢмқј (README.md л“ұ)
      - '.gitignore'     # gitignore нҢҢмқј
      - 'LICENSE'        # лқјмқҙм„ мҠӨ нҢҢмқј
      - 'docs/**'        
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # лҸ„м»Ө н—ҲлёҢ лЎңк·ёмқё
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # мқҙлҜём§Җ л№Ңл“ң л°Ҹ н‘ёмӢң 
      - name: Build and Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/torchi-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/torchi-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha # GitHub Actions мәҗмӢң мӮ¬мҡ©
          cache-to: type=gha,mode=max
      # л°°нҸ¬ мҠ№мқё мҡ”мІӯ
      - name: Request Deployment Approval
        id: approval
        run: |
          reaction=$(curl -s \
            -X POST "https://torchi.app/api/v1/push/${{ secrets.TORCHI_TOKEN }}/ask" \
            -d "msg=prod deploy (${{ env.IMAGE_TAG }})" \
            -d "actions=approve,reject")
          echo "reaction=$reaction" >> $GITHUB_OUTPUT

      # кұ°м Ҳ or нғҖмһ„м•„мӣғ мӢң мў…лЈҢ
      - name: Check Approval
        if: steps.approval.outputs.reaction != 'approve'
        run: |
          echo "prod deploy cancelled"
          exit 1
       
      # k8s-ssot м ҖмһҘмҶҢ мІҙнҒ¬м•„мӣғ 
      - name: Checkout SSOT Repo
        uses: actions/checkout@v4
        with:
          repository: opjt/torchi-infra 
          token: ${{ secrets.GH_PAT }}
          path: k8s-ssot

      # KustomizeлЎң мқҙлҜём§Җ нғңк·ё мҲҳм •
      - name: Update K8s Manifest
        run: |
          cd k8s-ssot/base/api 
          kustomize edit set image opjt/torchi-api=opjt/torchi-api:${{ env.IMAGE_TAG }}
          
          # Gitм—җ л°ҳмҳҒ
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: update api image to ${{ env.IMAGE_TAG }}"
          git push